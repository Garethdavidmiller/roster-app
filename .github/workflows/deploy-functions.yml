name: Deploy Firebase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install function dependencies
        run: npm install
        working-directory: functions

      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa-key.json

      - name: Authenticate gcloud
        run: gcloud auth activate-service-account --key-file=/tmp/sa-key.json

      - name: Push HUDDLE_SECRET to Secret Manager
        run: |
          # Create the secret if it doesn't exist yet
          gcloud secrets describe HUDDLE_SECRET --project=myb-roster 2>/dev/null \
            || gcloud secrets create HUDDLE_SECRET --project=myb-roster --replication-policy=automatic
          # Add (or update) the secret value
          echo -n '${{ secrets.HUDDLE_SECRET }}' \
            | gcloud secrets versions add HUDDLE_SECRET --project=myb-roster --data-file=-

      - name: Set artifact cleanup policy
        run: firebase functions:artifacts:setpolicy --project myb-roster
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json

      - name: Deploy to Firebase
        run: |
          # Capture output and exit code separately.
          # || prevents bash -e from killing the script on non-zero exit.
          firebase deploy --only functions --force --project myb-roster \
            > /tmp/deploy-out.txt 2>&1 || exit_code=$?

          # Print output but strip the cleanup-policy noise entirely.
          grep -v "cleanup policy\|setpolicy\|Pass the --force" /tmp/deploy-out.txt || true

          # Non-zero exit caused solely by cleanup policy → treat as success.
          if [ "${exit_code:-0}" -ne 0 ]; then
            if grep -q "cleanup policy" /tmp/deploy-out.txt; then
              echo "Deploy succeeded. Cleanup policy permission not granted — harmless, ignoring."
              exit 0
            fi
            # Real deployment failure — surface it.
            exit "${exit_code}"
          fi
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa-key.json
