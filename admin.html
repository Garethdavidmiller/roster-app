<!DOCTYPE html>
<!-- MYB Roster Admin v2 — Week override form -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MYB Roster — Admin</title>
    <style>
        /* ---- CSS variables — identical to index.html ---- */
        :root {
            --primary-blue:      #001e3c;
            --primary-blue-dark: #00152a;
            --accent-gold:       #f5c800;
            --green:             #43a047;
            --green-hover:       #388e3c;
            --green-light:       #e8f5e9;
            --orange:            #ff9800;
            --orange-light:      #fff3e0;
            --blue-light:        #e3f2fd;
            --blue-sky:          #2196f3;
            --purple:            #9c27b0;
            --purple-light:      #f3e5f5;
            --rdw:               #e91e63;
            --rdw-light:         #fce4ec;
            --al:                #00897b;
            --al-light:          #e0f2f1;
            --error-bg:          #ffebee;
            --error-red:         #d32f2f;
            --text-dark:         #333;
            --text-mid:          #555;
            --text-light:        #999;
            --border-light:      #e8e8e8;
            --bg-light:          #f8f8f8;
            --bg-faint:          #f5f5f5;
            --radius-md:         16px;
            --radius-lg:         20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* Dark navy page background — matches the app body */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--primary-blue);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-dark);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ---- App header — matches .header in index.html ---- */
        .app-header {
            background: var(--bg-light);
            padding: 9px 16px;
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
        }

        .app-header img {
            height: 26px;
            width: 26px;
            border-radius: 6px;
        }

        .app-header h1 {
            color: var(--primary-blue);
            font-size: 20px;
            font-weight: 700;
        }

        .app-header .header-sub {
            font-weight: 400;
            color: var(--text-light);
            font-size: 16px;
        }

        /* ---- Cards ---- */
        .card {
            background: white;
            border-radius: var(--radius-md);
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .card-header {
            background: var(--bg-light);
            border-bottom: 1px solid var(--border-light);
            padding: 12px 18px;
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        .card-header h2 {
            color: var(--primary-blue);
            font-size: 15px;
            font-weight: 700;
        }

        .card-header .hint {
            font-size: 12px;
            color: var(--text-light);
        }

        .card-body { padding: 18px; }

        /* ---- Shift badges — identical to index.html ---- */
        .shift-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        .badge-rest  { background: var(--green);    color: white; }
        .badge-early { background: var(--orange);   color: white; }
        .badge-late  { background: var(--blue-sky); color: white; }
        .badge-night { background: #1a1a2e;          color: white; }
        .badge-spare { background: var(--purple);   color: white; }
        .badge-rdw   { background: var(--rdw);      color: white; }
        .badge-al    { background: var(--al-light);  color: #004d40; }

        /* ---- Selectors row ---- */
        .selectors {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        @media (max-width: 480px) { .selectors { grid-template-columns: 1fr; } }

        .field-label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-mid);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        select, input[type="text"], input[type="date"] {
            width: 100%;
            padding: 9px 11px;
            border: 1.5px solid var(--border-light);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-dark);
            background: white;
            -webkit-appearance: none;
            appearance: none;
            transition: border-color 0.15s;
            font-family: inherit;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        select:disabled, input:disabled {
            background: var(--bg-faint);
            color: var(--text-light);
            cursor: not-allowed;
        }

        /* ---- Bulk fill bar ---- */
        .bulk-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-faint);
            border: 1.5px solid var(--border-light);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .bulk-bar .field-label {
            margin: 0;
            white-space: nowrap;
        }

        .bulk-bar select { flex: 1; min-width: 130px; font-size: 13px; padding: 7px 9px; }
        .bulk-bar input  { flex: 1; min-width: 110px; font-size: 13px; padding: 7px 9px; }

        .btn-apply {
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 7px;
            font-size: 12px;
            font-weight: 700;
            padding: 8px 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
            font-family: inherit;
        }

        .btn-apply:hover { background: var(--primary-blue-dark); }

        /* ---- Week grid ---- */
        .week-grid {
            border: 1.5px solid var(--border-light);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 14px;
        }

        /* Column layout: checkbox | day | base roster | type | value | note */
        .grid-cols {
            display: grid;
            grid-template-columns: 36px 100px 96px 1fr 130px 1fr;
            gap: 8px;
            align-items: center;
        }

        .week-grid-header {
            padding: 7px 12px;
            background: var(--primary-blue);
        }

        .week-grid-header .grid-cols > div {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.55);
        }

        @media (max-width: 680px) {
            .week-grid-header { display: none; }
            .grid-cols {
                grid-template-columns: 32px 1fr 1fr;
                grid-template-rows: auto auto;
            }
            .col-check  { grid-column: 1; grid-row: 1; }
            .col-day    { grid-column: 2; grid-row: 1; }
            .col-base   { grid-column: 3; grid-row: 1; justify-self: end; }
            .col-type   { grid-column: 1 / -1; }
            .col-value  { grid-column: 1 / -1; }
            .col-note   { grid-column: 1 / -1; }
        }

        .day-row {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-light);
            transition: background 0.12s;
        }

        .day-row:last-child { border-bottom: none; }
        .day-row.active     { background: #fffde7; }

        .col-check {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .col-check input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-blue);
        }

        .col-day .day-name {
            display: block;
            font-weight: 700;
            font-size: 13px;
        }

        .col-day .day-date {
            display: block;
            font-size: 11px;
            color: var(--text-light);
            margin-top: 1px;
        }

        .col-type select,
        .col-value input,
        .col-note input {
            font-size: 13px;
            padding: 7px 9px;
        }

        /* Hide type/value/note on mobile when row is inactive */
        @media (max-width: 680px) {
            .day-row:not(.active) .col-type,
            .day-row:not(.active) .col-value,
            .day-row:not(.active) .col-note { display: none; }
        }

        /* ---- Empty state ---- */
        .week-empty {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-light);
            font-size: 14px;
        }

        /* ---- Save button — matches app's Today button style ---- */
        .btn-save {
            width: 100%;
            padding: 12px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            font-family: inherit;
        }

        .btn-save:hover   { background: var(--primary-blue-dark); }
        .btn-save:active  { transform: scale(0.98); }
        .btn-save:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

        /* ---- Feedback ---- */
        .feedback {
            display: none;
            padding: 11px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 12px;
            line-height: 1.4;
        }

        .feedback.success { display: block; background: var(--green-light); color: #1b5e20; }
        .feedback.error   { display: block; background: var(--error-bg);    color: var(--error-red); }

        /* ---- Overrides list ---- */
        .list-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: var(--bg-faint);
            border-bottom: 1px solid var(--border-light);
        }

        .list-toolbar select { flex: 1; font-size: 13px; padding: 7px 9px; }

        .list-count {
            font-size: 12px;
            color: var(--text-light);
            white-space: nowrap;
        }

        .override-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .override-table th {
            background: var(--bg-light);
            color: var(--text-mid);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 9px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border-light);
            white-space: nowrap;
        }

        .override-table td {
            padding: 9px 14px;
            border-bottom: 1px solid var(--border-light);
            vertical-align: middle;
        }

        .override-table tr:last-child td { border-bottom: none; }
        .override-table tbody tr:hover td { background: var(--bg-faint); }

        .type-pill {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .pill-spare_shift  { background: var(--purple-light); color: var(--purple); }
        .pill-overtime     { background: var(--rdw-light);    color: var(--rdw);    }
        .pill-rdw          { background: var(--rdw-light);    color: var(--rdw);    }
        .pill-swap         { background: var(--blue-light);   color: var(--blue-sky); }
        .pill-annual_leave { background: var(--al-light);     color: #004d40;       }
        .pill-correction   { background: var(--orange-light); color: #e65100;       }

        .btn-delete {
            background: transparent;
            color: var(--error-red);
            border: 1px solid currentColor;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.12s;
            font-family: inherit;
        }

        .btn-delete:hover              { background: var(--error-bg); }
        .btn-delete.confirming         { background: var(--error-red); color: white; }
        .btn-delete.confirming:hover   { background: #c62828; }

        .state-row td {
            text-align: center;
            padding: 28px;
            color: var(--text-light);
            font-size: 13px;
        }

        .table-scroll { overflow-x: auto; }
    </style>
</head>

<div class="container">

    <!-- Header — matches the app's .header card -->
    <header class="app-header">
        <img src="icon-192.png" alt="Chiltern Railways">

    <!-- ==================== WEEK OVERRIDE FORM ==================== -->
    <div class="card">
        <div class="card-header">
            <h2>Add Overrides</h2>
            <span class="hint">Pick a member and any date in the week</span>
        </div>
        <div class="card-body">

            <div class="selectors">
                <div>
                    <label class="field-label" for="fieldMember">Staff Member</label>
                    <select id="fieldMember">
                        <option value="">— Select —</option>
                    </select>
                </div>
                <div>
                    <label class="field-label" for="fieldDate">Week containing date</label>
                    <input type="date" id="fieldDate">
                </div>
            </div>

            <!-- Bulk fill — hidden until a week is loaded -->
            <div class="bulk-bar" id="bulkBar" style="display:none">
                <span class="field-label">Fill all selected:</span>
                <select id="bulkType">
                    <option value="">— Type —</option>
                    <option value="spare_shift">Spare → shift time</option>
                    <option value="overtime">Overtime</option>
                    <option value="rdw">Rest Day Worked</option>
                    <option value="swap">Swap</option>
                    <option value="annual_leave">Annual Leave</option>
                    <option value="correction">Correction → Rest</option>
                </select>
                <input type="text" id="bulkValue" placeholder="HH:MM-HH:MM">
                <button class="btn-apply" id="bulkApplyBtn">Apply to selected</button>
            </div>

            <div class="week-grid" id="weekGrid">
                <div class="week-empty">Select a staff member and date to load the week.</div>
            </div>

            <button class="btn-save" id="saveBtn" disabled>Save Selected Days</button>
            <div class="feedback" id="formFeedback"></div>

        </div>
    </div>

    <!-- ==================== EXISTING OVERRIDES ==================== -->
    <div class="card">
        <div class="card-header">
            <h2>Existing Overrides</h2>
        </div>
        <div class="list-toolbar">
            <select id="filterMember"><option value="">All staff</option></select>
            <span class="list-count" id="listCount">Loading…</span>
        </div>
        <div class="table-scroll">
            <table class="override-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Member</th>
                        <th>Type</th>
                        <th>Value</th>
                        <th>Note</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="overrideTableBody">
                    <tr class="state-row"><td colspan="6">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div><!-- /container -->

    const DAY_KEYS   = ['sun','mon','tue','wed','thu','fri','sat'];

    const SHIFT_REGEX = /^([01]?[0-9]|2[0-3]):[0-5][0-9]-([01]?[0-9]|2[0-3]):[0-5][0-9]$/;

    const OVERRIDE_TYPES = {
        spare_shift:  { label: 'Spare → shift',   valueType: 'time'  },

    // ============================================
    // ROSTER LOGIC — mirrors index.html exactly
    // ============================================

    function getRosterData(member) {
        const t = member.rosterType;
        if (t === 'fixed')      return fixedRoster;
        if (t === 'ces')        return cesRoster;
        if (t === 'dispatcher') return dispatcherRoster;
        if (t === 'bilingual')  return bilingualRoster;
        return weeklyRoster;
    }

    function getWeekNumberForDate(date, member) {
        if (member.rosterType === 'fixed') return 1;
        const cycleLength = member.rosterType === 'bilingual'   ? CONFIG.BILINGUAL_ROSTER_WEEKS
                          : member.rosterType === 'ces'         ? CONFIG.CES_ROSTER_WEEKS
                          : member.rosterType === 'dispatcher'  ? CONFIG.DISPATCHER_ROSTER_WEEKS
                          : CONFIG.MAIN_ROSTER_WEEKS;
        const dateNoon    = new Date(date.getFullYear(), date.getMonth(), date.getDate(), 12, 0, 0);
        const sunday      = new Date(dateNoon);
        sunday.setDate(dateNoon.getDate() - dateNoon.getDay());
        const refDate     = member.rosterType === 'bilingual'  ? CONFIG.BILINGUAL_ROSTER_REFERENCE_DATE
                          : member.rosterType === 'ces'        ? CONFIG.CES_ROSTER_REFERENCE_DATE
                          : member.rosterType === 'dispatcher' ? CONFIG.DISPATCHER_ROSTER_REFERENCE_DATE
                          : CONFIG.MAIN_ROSTER_REFERENCE_DATE;
        const weeksDiff   = Math.floor(Math.round((sunday - refDate) / 86400000) / 7);
        let   weekNum     = member.currentWeek + weeksDiff;
        return ((weekNum - 1) % cycleLength + cycleLength) % cycleLength + 1;
    }

    function getBaseShift(member, date) {
        // Christmas rule — same as index.html
        if (date.getMonth() === 11 && (date.getDate() === 25 || date.getDate() === 26)) return 'RD';
        const weekNum    = getWeekNumberForDate(date, member);
        const rosterData = getRosterData(member);
        return (rosterData[weekNum] && rosterData[weekNum][DAY_KEYS[date.getDay()]]) || 'RD';
    }

    function shiftBadge(shift) {
        if (!shift || shift === 'RD' || shift === 'OFF')
            return '<span class="shift-badge badge-rest">🏠 Rest</span>';
        if (shift === 'SPARE') return '<span class="shift-badge badge-spare">📋 Spare</span>';
        if (shift === 'RDW')   return '<span class="shift-badge badge-rdw">💼 RDW</span>';
        if (shift === 'AL')    return '<span class="shift-badge badge-al">🏖️ AL</span>';
        if (!SHIFT_REGEX.test(shift)) return '<span class="shift-badge">?</span>';
        const h = parseInt(shift, 10);
        if (h >= CONFIG.NIGHT_SHIFT_THRESHOLD || h < 6)
            return '<span class="shift-badge badge-night">🦉 Night</span>';
        return h < CONFIG.EARLY_SHIFT_THRESHOLD
            ? '<span class="shift-badge badge-early">☀️ Early</span>'
            : '<span class="shift-badge badge-late">🌙 Late</span>';
    }

    // ============================================
    // DOM REFS
    // ============================================
    const fieldMember  = document.getElementById('fieldMember');
    const fieldDate    = document.getElementById('fieldDate');
    const bulkBar      = document.getElementById('bulkBar');
    const bulkType     = document.getElementById('bulkType');
    const bulkValue    = document.getElementById('bulkValue');
    const bulkApplyBtn = document.getElementById('bulkApplyBtn');
    const weekGrid     = document.getElementById('weekGrid');
    const saveBtn      = document.getElementById('saveBtn');
    const formFeedback = document.getElementById('formFeedback');
    const filterMember = document.getElementById('filterMember');
    const tableBody    = document.getElementById('overrideTableBody');
    const listCount    = document.getElementById('listCount');

    // ============================================
    // POPULATE MEMBER DROPDOWNS — grouped by role
    // ============================================
    const roles = [...new Set(teamMembers.map(m => m.role))];
    roles.forEach(role => {
        const grp1 = document.createElement('optgroup');
        const grp2 = document.createElement('optgroup');
        grp1.label = grp2.label = role;
        teamMembers.filter(m => m.role === role).forEach(m => {
            grp1.appendChild(new Option(m.name, m.name));
            filterMember.appendChild(new Option(m.name, m.name));
        });
        fieldMember.appendChild(grp1);
    });

    // Default date = today
    const today = new Date();
    fieldDate.value = formatISO(today);

    // ============================================
    // WEEK GRID
    // ============================================

    function renderWeekGrid() {
        const memberName = fieldMember.value;
        const dateStr    = fieldDate.value;

        if (!memberName || !dateStr) {
            weekGrid.innerHTML = '<div class="week-empty">Select a staff member and date to load the week.</div>';
            bulkBar.style.display = 'none';
            saveBtn.disabled = true;
            return;
        }

        const member = teamMembers.find(m => m.name === memberName);
        if (!member) return;

        // Sunday of the selected week
        const picked = new Date(dateStr + 'T12:00:00');
        const sunday = new Date(picked);
        sunday.setDate(picked.getDate() - picked.getDay());

        weekGrid.innerHTML = `
            <div class="week-grid-header">
                <div class="grid-cols">
                    <div></div>
                    <div>Day</div>
                    <div>Base roster</div>
                    <div>Override type</div>
                    <div>Shift time</div>
                    <div>Note (optional)</div>
                </div>
            </div>`;

        for (let i = 0; i < 7; i++) {
            const date = new Date(sunday);
            date.setDate(sunday.getDate() + i);

            const baseShift = getBaseShift(member, date);
            const dateISO   = formatISO(date);
            const dayLabel  = `${DAY_NAMES[date.getDay()]} ${date.getDate()} ${MONTH_ABBR[date.getMonth()]}`;

            const row = document.createElement('div');
            row.className   = 'day-row';
            row.dataset.date = dateISO;

            row.innerHTML = `
                <div class="grid-cols">
                    <div class="col-check">
                        <input type="checkbox" class="day-enable" aria-label="Override ${dayLabel}">
                    </div>
                    <div class="col-day">
                        <span class="day-name">${DAY_NAMES[date.getDay()]}</span>
                        <span class="day-date">${date.getDate()} ${MONTH_ABBR[date.getMonth()]}</span>
                    </div>
                    <div class="col-base">${shiftBadge(baseShift)}</div>
                    <div class="col-type">
                        <select class="day-type" disabled>
                            <option value="">— Type —</option>
                            <option value="spare_shift">Spare → shift time</option>
                            <option value="overtime">Overtime</option>
                            <option value="rdw">Rest Day Worked</option>
                            <option value="swap">Swap</option>
                            <option value="annual_leave">Annual Leave</option>
                            <option value="correction">Correction → Rest</option>
                        </select>
                    </div>
                    <div class="col-value">
                        <input class="day-value" type="text" placeholder="HH:MM-HH:MM" disabled>
                    </div>
                    <div class="col-note">
                        <input class="day-note" type="text" placeholder="Note" disabled>
                    </div>
                </div>`;

            const cb      = row.querySelector('.day-enable');
            const typeEl  = row.querySelector('.day-type');
            const valueEl = row.querySelector('.day-value');
            const noteEl  = row.querySelector('.day-note');

            cb.addEventListener('change', () => {
                const on = cb.checked;
                row.classList.toggle('active', on);
                typeEl.disabled = noteEl.disabled = !on;
                if (!on) { typeEl.value = valueEl.value = ''; valueEl.disabled = true; }
                updateSaveBtn();
            });

            typeEl.addEventListener('change', () => applyTypeToRow(typeEl, valueEl));

            weekGrid.appendChild(row);
        }

        bulkBar.style.display = 'flex';
        updateSaveBtn();
    }

    function applyTypeToRow(typeEl, valueEl) {
        const meta = OVERRIDE_TYPES[typeEl.value];
        if (!meta) { valueEl.value = ''; valueEl.disabled = true; return; }
        if (meta.valueType === 'fixed') {
            valueEl.value = meta.fixedValue;
            valueEl.disabled = true;
        } else {
            valueEl.value = '';
            valueEl.disabled = false;
            valueEl.placeholder = 'HH:MM-HH:MM';
        }
    }

    function updateSaveBtn() {
        saveBtn.disabled = ![...weekGrid.querySelectorAll('.day-row')].some(row => {
            const cb = row.querySelector('.day-enable');
            const t  = row.querySelector('.day-type');
            return cb && cb.checked && t && t.value;
        });
    }

    fieldMember.addEventListener('change', renderWeekGrid);
    fieldDate.addEventListener('change',   renderWeekGrid);
    renderWeekGrid();

    // ============================================
    // BULK FILL
    // ============================================
    bulkType.addEventListener('change', () => {
        const meta = OVERRIDE_TYPES[bulkType.value];
        if (meta && meta.valueType === 'fixed') {
            bulkValue.value = meta.fixedValue;
            bulkValue.disabled = true;
        } else {
            bulkValue.value = '';
            bulkValue.disabled = false;
        }
    });

    bulkApplyBtn.addEventListener('click', () => {
        const type  = bulkType.value;
        const value = bulkValue.value.trim();
        if (!type) { alert('Select a type in the "Fill all selected" bar first.'); return; }
        weekGrid.querySelectorAll('.day-row').forEach(row => {
            const cb = row.querySelector('.day-enable');
            if (!cb || !cb.checked) return;
            const typeEl  = row.querySelector('.day-type');
            const valueEl = row.querySelector('.day-value');
            typeEl.value = type;
            applyTypeToRow(typeEl, valueEl);
            const meta = OVERRIDE_TYPES[type];
            if (meta && meta.valueType === 'time' && value) valueEl.value = value;
        });
        updateSaveBtn();
    });

    // ============================================
    // SAVE
    // ============================================
    saveBtn.addEventListener('click', async () => {
        hideFeedback();
        const memberName = fieldMember.value;
        if (!memberName) return showError('No member selected.');

        const toSave = [], errors = [];
        weekGrid.querySelectorAll('.day-row').forEach(row => {
            const cb = row.querySelector('.day-enable');
            if (!cb || !cb.checked) return;
            const date  = row.dataset.date;
            const type  = row.querySelector('.day-type').value;
            const value = row.querySelector('.day-value').value.trim();
            const note  = row.querySelector('.day-note').value.trim();
            if (!type)  { errors.push(`${date}: no type`); return; }
            if (!value) { errors.push(`${date}: no value`); return; }
            const meta = OVERRIDE_TYPES[type];
            if (meta && meta.valueType === 'time' && !SHIFT_REGEX.test(value)) {
                errors.push(`${date}: "${value}" is not HH:MM-HH:MM`); return;
            }
            toSave.push({ memberName, date, type, value, note });
        });

        if (errors.length)  return showError(errors.join(' · '));
        if (!toSave.length) return showError('No days selected or ready to save.');

        saveBtn.disabled = true;
        saveBtn.textContent = `Saving ${toSave.length} day${toSave.length > 1 ? 's' : ''}…`;

        try {
            await Promise.all(toSave.map(e =>
                addDoc(collection(db, 'overrides'), { ...e, createdAt: serverTimestamp() })
            ));
            showSuccess(`Saved ${toSave.length} override${toSave.length > 1 ? 's' : ''} for ${memberName}`);
            // Uncheck all rows
            weekGrid.querySelectorAll('.day-enable').forEach(cb => {
                if (cb.checked) { cb.checked = false; cb.dispatchEvent(new Event('change')); }
            });
            await loadOverrides();
        } catch (err) {
            console.error('[Admin] Save failed:', err);
            showError(err.code === 'permission-denied'
                ? 'Permission denied — update Firestore rules to allow write: if true'
                : 'Save failed. Check the browser console.');
        } finally {
            saveBtn.disabled = false;
            saveBtn.textContent = 'Save Selected Days';
            updateSaveBtn();
        }
    });

    // ============================================
    // OVERRIDES LIST
    // ============================================
    let allOverrides = [];

    filterMember.addEventListener('change', renderTable);

    async function loadOverrides() {
        tableBody.innerHTML = '<tr class="state-row"><td colspan="6">Loading…</td></tr>';
        try {
            const snap = await getDocs(collection(db, 'overrides'));
            allOverrides = [];
            snap.forEach(s => allOverrides.push({ id: s.id, ...s.data() }));
            allOverrides.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
            renderTable();
        } catch (err) {
            console.error('[Admin] Load failed:', err);
            tableBody.innerHTML = '<tr class="state-row"><td colspan="6">Failed to load. Check console.</td></tr>';
            listCount.textContent = 'Error';
        }
    }

    function renderTable() {
        const filter = filterMember.value;
        const rows   = filter ? allOverrides.filter(o => o.memberName === filter) : allOverrides;
        listCount.textContent = `${rows.length} override${rows.length !== 1 ? 's' : ''}`;
        if (!rows.length) {
            tableBody.innerHTML = '<tr class="state-row"><td colspan="6">No overrides found.</td></tr>';
            return;
        }
        tableBody.innerHTML = '';
        rows.forEach(o => {
            const meta = OVERRIDE_TYPES[o.type];
            const tr   = document.createElement('tr');
            tr.innerHTML = `
                <td style="white-space:nowrap;font-weight:600">${formatDisplayDate(o.date)}</td>
                <td>${escapeHtml(o.memberName || '—')}</td>
                <td><span class="type-pill pill-${o.type}">${meta ? meta.label : escapeHtml(o.type)}</span></td>
                <td style="font-family:monospace;font-size:12px">${escapeHtml(o.value || '—')}</td>
                <td style="color:var(--text-light);font-style:italic">${escapeHtml(o.note || '')}</td>
                <td>
                    <button class="btn-delete" data-id="${o.id}"
                        aria-label="Delete override for ${escapeHtml(o.memberName)} on ${o.date}">Delete</button>
                </td>`;
            tableBody.appendChild(tr);
        });
        tableBody.querySelectorAll('.btn-delete').forEach(btn => btn.addEventListener('click', handleDelete));
    }

    async function handleDelete(e) {
        const btn = e.currentTarget;
        if (!btn.classList.contains('confirming')) {
            btn.classList.add('confirming');
            btn.textContent = 'Confirm?';
            setTimeout(() => {
                if (btn.classList.contains('confirming')) {
                    btn.classList.remove('confirming');
                    btn.textContent = 'Delete';
                }
            }, 3000);
            return;
        }
        btn.disabled = true; btn.textContent = '…';
        try {
            await deleteDoc(doc(db, 'overrides', btn.dataset.id));
            allOverrides = allOverrides.filter(o => o.id !== btn.dataset.id);
            renderTable();
        } catch (err) {
            console.error('[Admin] Delete failed:', err);
            btn.disabled = false; btn.classList.remove('confirming'); btn.textContent = 'Delete';
        }
    }

    // ============================================
    // UTILITIES
    // ============================================
    function formatISO(date) {
        return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    }

    function formatDisplayDate(str) {
        if (!str) return '—';
        const [y, m, d] = str.split('-');
        return `${parseInt(d,10)} ${MONTH_ABBR[parseInt(m,10)-1]} ${y}`;
    }

    function escapeHtml(str) {
        if (str == null) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showSuccess(msg) {
        formFeedback.className = 'feedback success';
        formFeedback.textContent = '✓ ' + msg;
        setTimeout(hideFeedback, 6000);
    }

    function showError(msg) {
        formFeedback.className = 'feedback error';
        formFeedback.textContent = '⚠ ' + msg;
    }

    function hideFeedback() { formFeedback.className = 'feedback'; }

    loadOverrides();
</script>
</body>
</html>
