<!DOCTYPE html>
<!-- CEA Roster Calendar - Version 3.86 - iOS zoom fix, midnight night threshold, name-based default, color-scheme -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <title>MYB Roster</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Marylebone station shift roster calendar for Chiltern Railways staff">
    <meta name="theme-color" content="#001e3c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MYB Roster">
    <link rel="manifest" href="manifest.json">
    
    <!-- Apple Touch Icons for iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
    <link rel="apple-touch-icon" sizes="167x167" href="icon-167.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="icon-120.png">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    
    <style>
        :root {
            /* Brand colours */
            --primary-blue: #001e3c;
            --primary-blue-dark: #00152a;    /* Hover state for primary buttons */
            --accent-gold: #f5c800;
            --accent-gold-dark: #e6bb00;     /* Hover state for today button */

            /* Shift colours */
            --green: #43a047;
            --green-hover: #388e3c;          /* Hover state for print button */
            --green-light: #e8f5e9;
            --orange: #ff9800;
            --orange-light: #fff3e0;
            --blue-light: #e3f2fd;
            --blue-sky: #2196f3;
            --purple: #9c27b0;
            --purple-light: #f3e5f5;
            --rdw: #e91e63;
            --rdw-light: #fce4ec;
            --al: #00897b;
            --al-light: #e0f2f1;

            /* Error colours */
            --error-bg: #ffebee;
            --error-red: #d32f2f;
            --error-banner: #c62828;

            /* Neutral colours */
            --text-dark: #333;
            --text-mid: #555;
            --text-light: #999;
            --text-faint: #aaa;
            --border-light: #e8e8e8;
            --border-mid: #cccccc;   /* Used for other-day cells and similar mid-tone borders */
            --bg-light: #f8f8f8;
            --bg-faint: #f5f5f5;
            --today-print: #ffffcc; /* Softer gold for print — avoids ink waste vs full accent-gold */

            /* Border Radius */
            --radius-md: 16px;
            --radius-lg: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Removes grey flash on tap in iOS Safari */
        }

        /* iOS status bar fix - blends with app theme */
        html {
            background-color: var(--primary-blue);
        }

        /* In-app error banner (replaces alert()) */
        .error-banner {
            display: none;
            background: var(--error-banner);
            color: white;
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            margin-bottom: 16px;
            font-size: 13px;
            font-weight: 600;
            line-height: 1.5;
        }

        .error-banner.visible {
            display: block;
        }

        /* Calendar render error — shown inside #calendarDisplay if buildCalendarContainer throws */
        .calendar-error {
            padding: 40px;
            text-align: center;
            color: var(--error-red);
            background: var(--error-bg);
            border-radius: var(--radius-md);
            margin: 20px;
        }

        .calendar-error-message {
            font-size: 14px;
            color: var(--text-dark);
            margin-top: 10px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--primary-blue);
            min-height: 100dvh; /* dvh avoids mobile browser chrome layout jump; 100vh fallback below */
            min-height: 100vh;  /* Fallback for browsers without dvh support */
            /* Safe area insets baked in with max() — survives any breakpoint shorthand override.
               env() returns 0 on non-notched devices so this is always safe to apply. */
            padding-top:    max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            padding-left:   max(20px, env(safe-area-inset-left));
            padding-right:  max(20px, env(safe-area-inset-right));
            overflow-x: hidden;
            overscroll-behavior: none;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            background: var(--bg-light);
            padding: 9px 16px;
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 16px;
            text-align: center;
        }

        .header h1 {
            color: var(--primary-blue);
            font-size: 20px;
            margin: 0;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header-sub {
            font-weight: 400;
            color: var(--text-light);
            font-size: 16px;
        }
        
        .title-icon {
            height: 26px;
            width: 26px;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0, 30, 60, 0.3);
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        @media (hover: hover) and (pointer: fine) {
            .title-icon:hover { transform: scale(1.12); }
        }

        .title-icon:active { transform: scale(0.92); }

        /* Today cell pulse - single gentle scale, fires once */
        @keyframes todayPulse {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.06); box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.4); }
            100% { transform: scale(1); box-shadow: none; }
        }

        .calendar-day.today.today-pulse {
            animation: todayPulse 0.5s ease-out forwards;
        }

        @media (prefers-reduced-motion: reduce) {
            .calendar-day.today.today-pulse {
                animation: none;
            }
        }

        .controls {
            background: white;
            padding: 10px 16px;
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .controls-row {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .control-group {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
        }

        .controls button {
            min-width: auto;
            width: auto;            /* Prevents Android flex-stretch making buttons full-width */
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* Visually hidden — removes element from visual layout but keeps it
           readable by screen readers. More reliable than display:none for assistive tech. */
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .controls select, .controls button {
            padding: 9px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            background: white;
            font-family: inherit;
            font-weight: 600;
            transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
            touch-action: manipulation; /* Removes 300ms tap delay */
        }

        .controls select {
            text-align: center;
            text-align-last: center;
            -webkit-appearance: none; /* Removes iOS glossy bubble */
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23001e3c' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 1em;
            padding-right: 30px;
            font-size: 16px; /* Prevents iOS Safari auto-zoom on focus */
            max-width: 160px;
        }

        .controls select option {
            text-align: center;
        }

        .controls button {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
            box-shadow: 0 2px 4px rgba(0, 30, 60, 0.2);
            transition: background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        @media (hover: hover) and (pointer: fine) {
            .controls button:hover {
                background: var(--primary-blue-dark);
                border-color: var(--primary-blue-dark);
                transform: translateY(-1px);
                box-shadow: 0 4px 8px rgba(0, 30, 60, 0.3);
            }

            .controls button.today-btn:hover {
                background: var(--accent-gold-dark);
                border-color: var(--accent-gold-dark);
            }

            .controls button.print-btn:hover {
                background: var(--green-hover);
                border-color: var(--green-hover);
            }
        }

        .controls button:active {
            transform: scale(0.96);
            opacity: 0.8;
            box-shadow: 0 2px 4px rgba(0, 30, 60, 0.2);
        }

        .controls button.today-btn {
            background: var(--accent-gold);
            color: var(--primary-blue);
            border-color: var(--accent-gold);
            font-weight: 700;
        }

        .controls button.print-btn {
            background: var(--green);
            color: white;
            border-color: var(--green);
            font-weight: 700;
        }

        .controls select:focus, .controls button:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(0, 30, 60, 0.1);
        }

        #calendarDisplay {
            position: relative;
            overflow: hidden; /* Clips incoming panel during slide — essential for Google Calendar effect */
            border-radius: var(--radius-lg); /* Match calendar-container so overflow:hidden clips cleanly at the card edge */
        }

        /* Applied to adjacent panels during a swipe gesture.
           Static layout properties live here; only transform and willChange are set dynamically in JS. */
        .carousel-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
        }

        .calendar-container {
            background: white;
            padding: 16px 24px 24px 24px;
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 16px;
            width: 100%;
            box-sizing: border-box;
            /* Note: transform transition is set entirely by the swipe JS (TRANSITION constant).
               No static transition here — it would conflict with pointerdown setting transition:'none'. */
            touch-action: pan-y pinch-zoom;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            cursor: grab;   /* Signals to desktop users that the calendar is draggable */
        }

        .calendar-container:active {
            cursor: grabbing;
        }
        
        .calendar-header {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: baseline;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-light);
            gap: 8px;
        }

        .month-year {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary-blue);
            letter-spacing: -0.5px;
        }

        .week-info {
            font-size: 13px;
            color: var(--text-faint);
            font-weight: 400;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 16px;
            width: 100%;
        }

        .day-header {
            text-align: center;
            font-weight: 700;
            color: white;
            background: var(--primary-blue);
            padding: 10px 4px;
            font-size: 12px;
            border-radius: 8px;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 4px rgba(0, 30, 60, 0.15);
        }

        .calendar-day {
            min-height: 120px;
            border: 1px solid #f0f0f0;
            border-radius: var(--radius-md);
            padding: 12px;
            background: white;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            box-shadow: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            text-align: center;
        }

        @media (hover: hover) and (pointer: fine) {
            .calendar-day:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(0,0,0,0.1);
                z-index: 2;
            }
        }

        .calendar-day.other-month {
            opacity: 0.15;
            background: var(--bg-faint);
        }

        .calendar-day.rest-day {
            background: var(--green-light);
            border-color: var(--green);
        }

        .calendar-day.early-shift {
            background: var(--orange-light);
            border-color: var(--orange);
        }

        .calendar-day.late-shift {
            background: var(--blue-light);
            border-color: var(--blue-sky);
        }

        .calendar-day.night-shift {
            background: rgba(20, 20, 40, 0.10);
            border-color: rgba(20, 20, 40, 0.30);
        }

        .calendar-day.spare-day {
            background: var(--purple-light);
            border-color: var(--purple);
        }

        .calendar-day.rdw-day {
            background: var(--rdw-light);
            border-color: var(--rdw);
        }

        .calendar-day.al-day {
            background: var(--al);
            border-color: var(--al);
        }

        .calendar-day.al-day .day-number,
        .calendar-day.al-day .shift-time {
            color: white;
        }

        .calendar-day.other-day {
            background: var(--bg-faint);
            border-color: var(--border-mid);
        }

        /* today must come AFTER shift colour rules — equal specificity means
           last rule wins, and gold should always override the shift colour */
        .calendar-day.today {
            border-color: var(--primary-blue);
            border-width: 3px;
            background: var(--accent-gold);
            box-shadow: 0 3px 10px rgba(255, 215, 0, 0.25), 0 0 0 1px var(--primary-blue);
            transform: scale(1.02);
        }

        .calendar-day.today .day-number {
            color: var(--primary-blue);
            font-weight: 900;
        }

        .calendar-day.bank-holiday::before {
            content: '⭐';
            position: absolute;
            top: 3px;
            right: 3px;
            font-size: 12px;
            z-index: 10;
        }

        /* Payday anchors top-left, bank holiday anchors top-right — no collision.
           Cutoff also anchors top-left so would overlap payday if both applied to the
           same day. In practice this cannot happen: cutoff is always Saturday, payday
           is always Friday or Thursday. Documented here in case the pay cycle changes. */
        .calendar-day.payday::before {
            content: '💷';
            position: absolute;
            top: 3px;
            left: 3px;
            font-size: 10px;
            z-index: 10;
        }
        
        .calendar-day.cutoff::before {
            content: '✂️';
            position: absolute;
            top: 3px;
            left: 3px;
            font-size: 10px;
            z-index: 10;
        }

        /* Christmas Day (Dec 25) — 🎄 tree centred at the bottom of the cell.
           Positions below the shift content without touching the corner markers.
           Only applied to Dec 25 — Boxing Day (Dec 26) is left plain so staff
           can see it as a potential overtime opportunity in Phase 1. */
        .calendar-day.christmas-day::after {
            content: '🎄';
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            line-height: 1;
        }

        .day-number {
            font-weight: 800;
            font-size: 20px;
            color: var(--text-dark);
            margin-bottom: 8px;
            text-align: center;
            width: 100%;
        }

        .calendar-day.other-month .day-number {
            color: var(--text-light);
        }

        .shift-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .badge-rest {
            background: var(--green);
            color: white;
        }

        .badge-early {
            background: var(--orange);
            color: white;
        }

        .badge-late {
            background: var(--blue-sky);
            color: white;
        }

        .badge-night {
            background: #1a1a2e;
            color: white;
        }

        .badge-spare {
            background: var(--purple);
            color: white;
        }

        .badge-rdw {
            background: var(--rdw);
            color: white;
        }

        .badge-al {
            background: var(--al-light);
            color: #004d40; /* Darkened from --al (#00897b) for WCAG AA contrast: 8.49:1 vs 3.73:1 */
        }

        .badge-other {
            background: #9e9e9e;
            color: white;
        }

        .shift-time {
            font-size: 16px;
            color: var(--text-dark);
            font-weight: 700;
            line-height: 1.6;
            letter-spacing: 0.3px;
            text-align: center;
            width: 100%;
        }

        .legend {
            background: white;
            padding: 10px 16px;
            border-radius: var(--radius-lg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
        }

        .legend-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 14px;
            align-items: center;
            justify-content: center;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            border: 2px solid var(--text-dark);
            flex-shrink: 0;
        }

        /* Legend colour variants */
        .legend-color.rest    { background: var(--green-light);  border-color: var(--green); }
        .legend-color.early   { background: var(--orange-light); border-color: var(--orange); }
        .legend-color.late    { background: var(--blue-light);   border-color: var(--blue-sky); }
        .legend-color.spare   { background: var(--purple-light); border-color: var(--purple); }
        .legend-color.rdw     { background: var(--rdw-light);    border-color: var(--rdw); }
        .legend-color.al      { background: var(--al);            border-color: var(--al); }
        .legend-color.today   { background: var(--accent-gold);  border-color: var(--primary-blue); }
        .legend-color.night   { background: rgba(20, 20, 40, 0.10); border-color: rgba(20, 20, 40, 0.30); }

        .legend-text {
            font-size: 12px;
            color: var(--text-mid);
            font-weight: 600;
            white-space: nowrap;
        }

        @media (max-width: 1024px) {
            .calendar-grid {
                gap: 8px;
            }
            
            .calendar-day {
                min-height: 100px;
                padding: 10px;
            }

            .shift-time {
                font-size: 13px;
            }

            .control-group {
                gap: 6px;
            }
        }

        @media (max-width: 768px) {
            body {
                padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
            }

            .header {
                padding: 12px 16px;
            }

            .calendar-container {
                padding: 15px;
            }

            .calendar-day {
                min-height: 80px;
                padding: 6px;
            }

            .day-header {
                font-size: 11px;
                padding: 10px 3px;
            }

            .header h1 {
                font-size: 18px;
            }

            .calendar-grid {
                gap: 4px;
            }

            .shift-time {
                font-size: 11px;
            }

            .day-number {
                font-size: 14px;
                margin-bottom: 4px;
            }

            .shift-badge {
                font-size: 8px;
                padding: 3px 8px;
                margin-bottom: 4px;
            }

            .controls {
                padding: 8px 10px;
                gap: 5px;
            }

            .controls button {
                padding: 8px 10px;
                font-size: 12px;
            }

            .controls select {
                padding: 8px 10px;
                font-size: 16px; /* Must stay 16px — iOS Safari zooms viewport if select < 16px */
            }
        }

        /* Desktop/Laptop - Larger icons for better visibility */
        @media (min-width: 1025px) {
            .calendar-day.bank-holiday::before {
                font-size: 18px !important;
                top: 5px !important;
                right: 5px !important;
            }

            .calendar-day.payday::before {
                font-size: 16px !important;
                top: 5px !important;
                left: 5px !important;
            }
            
            .calendar-day.cutoff::before {
                font-size: 16px !important;
                top: 5px !important;
                left: 5px !important;
            }

            .calendar-day.christmas-day::after {
                font-size: 20px !important;
                bottom: 6px !important;
            }

            /* On desktop the legend has plenty of horizontal space —
               collapse all three rows into a single centred row.
               legend-row wrappers become inline so items flow together. */
            .legend {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 6px 20px;
                padding: 12px 24px;
            }

            .legend-row {
                display: contents; /* Removes the row wrapper from layout — items flow directly into the legend flex container */
            }

            .legend-text {
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: max(3px, env(safe-area-inset-top)) max(3px, env(safe-area-inset-right)) max(3px, env(safe-area-inset-bottom)) max(3px, env(safe-area-inset-left));
            }

            .calendar-container {
                padding: 6px;
                border-radius: var(--radius-md);
            }

            .header {
                padding: 10px 14px;
                border-radius: var(--radius-md);
            }

            .controls {
                padding: 8px 10px;
                border-radius: var(--radius-md);
            }

            .calendar-day {
                min-height: 70px;
                padding: 3px;
                border-radius: 6px;
                border-width: 1px;
            }

            .calendar-day.today {
                border-width: 3px;
            }

            .day-header {
                font-size: 9px;
                padding: 6px 1px;
                border-radius: 6px;
            }

            .calendar-grid {
                gap: 2px;
            }

            .shift-time {
                font-size: 9px;
            }

            .day-number {
                font-size: 12px;
            }

            .shift-badge {
                font-size: 7px;
                padding: 2px 5px;
            }

        }

        /* Print styles */
        @media print {
            @page {
                margin: 0.5cm; /* Slightly reduced to give more breathing room */

        // ============================================
        // BANK HOLIDAYS CALCULATION
        // ============================================
        
        // Calculate UK Bank Holidays for any year
        function calculateBankHolidays(year) {
            const holidays = [];
            
            // New Year's Day (or substitute if weekend)
            let newYear = new Date(year, 0, 1);
            if (newYear.getDay() === 0) { // Sunday
                holidays.push(new Date(year, 0, 2));
            } else if (newYear.getDay() === 6) { // Saturday
                holidays.push(new Date(year, 0, 3));
            } else {
                holidays.push(newYear);
            }
            
            // Easter calculation (Computus algorithm)
            const a = year % 19;
            const b = Math.floor(year / 100);
            const c = year % 100;
            const d = Math.floor(b / 4);
            const e = b % 4;
            const f = Math.floor((b + 8) / 25);
            const g = Math.floor((b - f + 1) / 3);
            const h = (19 * a + b - d - g + 15) % 30;
            const i = Math.floor(c / 4);
            const k = c % 4;
            const l = (32 + 2 * e + 2 * i - h - k) % 7;
            const m = Math.floor((a + 11 * h + 22 * l) / 451);
            const month = Math.floor((h + l - 7 * m + 114) / 31) - 1;
            const day = ((h + l - 7 * m + 114) % 31) + 1;
            const easter = new Date(year, month, day);
            
            // Good Friday (2 days before Easter)
            const goodFriday = new Date(easter);
            goodFriday.setDate(easter.getDate() - 2);
            holidays.push(goodFriday);
            
            // Easter Monday (1 day after Easter)
            const easterMonday = new Date(easter);
            easterMonday.setDate(easter.getDate() + 1);
            holidays.push(easterMonday);
            
            // Early May Bank Holiday (first Monday in May)
            const mayFirst = new Date(year, 4, 1);
            const mayFirstDay = mayFirst.getDay();
            const daysUntilMonday = mayFirstDay === 0 ? 1 : mayFirstDay === 1 ? 0 : 8 - mayFirstDay;
            holidays.push(new Date(year, 4, 1 + daysUntilMonday));
            
            // Spring Bank Holiday (last Monday in May)
            const mayLast = new Date(year, 5, 0);
            const mayLastDay = mayLast.getDay();
            // Days to go back: Sat=5, Fri=4, Thu=3, Wed=2, Tue=1, Mon=0, Sun=6
            const mayDaysBack = (mayLastDay + 6) % 7;
            holidays.push(new Date(year, 4, mayLast.getDate() - mayDaysBack));
            
            // Summer Bank Holiday (last Monday in August)
            const augLast = new Date(year, 8, 0); // 8, 0 = last day of August
            const augLastDay = augLast.getDay();
            const augDaysBack = (augLastDay + 6) % 7;
            holidays.push(new Date(year, 7, augLast.getDate() - augDaysBack));
            
            // Christmas Day and Boxing Day — handled together since substitutes are linked.
            // Sat: both move → Mon 27, Tue 28
            // Sun: both move → Mon 27, Tue 28 (26th was Sat, also needs substitute)
            // Fri: Christmas stays, Boxing Day moves → Fri 25, Mon 28
            // Weekday: both as normal → 25, 26
            const christmasDay = new Date(year, 11, 25).getDay(); // 0=Sun, 6=Sat
            if (christmasDay === 6 || christmasDay === 0) {
                // Both substitutes fall on Mon 27 and Tue 28
                holidays.push(new Date(year, 11, 27));
                holidays.push(new Date(year, 11, 28));
            } else if (christmasDay === 5) {
                // Christmas on Friday — Boxing Day (Sat) needs substitute Mon 28
                holidays.push(new Date(year, 11, 25));
                holidays.push(new Date(year, 11, 28));
            } else {
                // Normal weekday — no substitutes needed
                holidays.push(new Date(year, 11, 25));
                holidays.push(new Date(year, 11, 26));
            }
            
            return holidays;
        }

        // Utility: compare two dates by calendar day only (ignores time component)
        // Defined here because isBankHoliday, isPayday and isCutoffDate all depend on it.
        function isSameDay(date1, date2) {
            return date1.getDate() === date2.getDate() &&
                   date1.getMonth() === date2.getMonth() &&
                   date1.getFullYear() === date2.getFullYear();
        }

        // Cache for performance (calculate once per year, reuse for all days)
        const bankHolidaysCache = {};
        function getBankHolidays(year) {
            if (!bankHolidaysCache[year]) {
                bankHolidaysCache[year] = calculateBankHolidays(year);
            }
            return bankHolidaysCache[year];
        }

        // Check if date is bank holiday
        function isBankHoliday(date) {
            const yearHolidays = getBankHolidays(date.getFullYear());
            return yearHolidays.some(holiday => isSameDay(holiday, date));
        }

        // Check if date is Christmas Day or Boxing Day (actual dates, not substitutes).
        // Both are automatically Rest Days regardless of what the roster says.
        // Dec 25 and Dec 26 are always off, even if the official bank holiday moves to
        // a substitute date on Mon/Tue due to a weekend clash.
        // Boxing Day (Dec 26) can be overridden to RDW via Firestore in Phase 1 for overtime.
        function isChristmasRD(date) {

        // Calculate all paydays and cutoff dates for a given year.
        // Uses direct maths rather than iteration — no loop performance risk for far-future years.
        function getPaydaysAndCutoffs(year) {
            if (year < CONFIG.MIN_YEAR) return { paydays: [], cutoffs: [] };
            if (!paydayCache[year]) {
                const paydays = [];
                const cutoffs = [];

                // Calculate how many complete 28-day cycles fit between FIRST_PAYDAY
                // and Jan 1 of the requested year, then jump straight to the first
                // payday on or after Jan 1 — no iterative stepping required.
                const jan1 = new Date(year, 0, 1, 12, 0, 0);
                const msPerDay = 24 * 60 * 60 * 1000;
                const daysSinceFirst = Math.floor((jan1 - CONFIG.FIRST_PAYDAY) / msPerDay);
                const cyclesSinceFirst = Math.floor(daysSinceFirst / CONFIG.PAYDAY_INTERVAL_DAYS);

                // First payday at or just before Jan 1
                let currentMs = CONFIG.FIRST_PAYDAY.getTime()
                    + cyclesSinceFirst * CONFIG.PAYDAY_INTERVAL_DAYS * msPerDay;

                // Step forward to first payday that falls within this year (at most 1 step)
                while (new Date(currentMs).getFullYear() < year) {
                    currentMs += CONFIG.PAYDAY_INTERVAL_DAYS * msPerDay;
                }

                // Collect all paydays within this year (at most 14 iterations)
                while (new Date(currentMs).getFullYear() === year) {
                    const raw = new Date(currentMs);
                    let payday = new Date(raw.getFullYear(), raw.getMonth(), raw.getDate(), 12, 0, 0);

                    // If payday falls on a bank holiday, step back day by day until clear.
                    // Loop handles the theoretical (but not yet real) case of back-to-back
                    // bank holidays on the payday Friday and the fallback Thursday.
                    while (isBankHoliday(payday)) {
                        payday.setDate(payday.getDate() - 1);
                    }

                    paydays.push(payday);

                    // Cutoff = most recent Saturday before payday
                    const cutoff = new Date(payday);
                    const dow = payday.getDay(); // 0=Sun … 6=Sat
                    // Days back to Saturday: Sun=1, Mon=2, Tue=3, Wed=4, Thu=5, Fri=6, Sat=0
                    const daysBackToSaturday = [1, 2, 3, 4, 5, 6, 0];
                    const daysBack = daysBackToSaturday[dow];
                    cutoff.setDate(payday.getDate() - daysBack);
                    cutoffs.push(cutoff);

                    currentMs += CONFIG.PAYDAY_INTERVAL_DAYS * msPerDay;
                }

                paydayCache[year] = { paydays, cutoffs };
            }

            return paydayCache[year];
        }
